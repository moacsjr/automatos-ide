name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'infra/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TERRAFORM_DIR: infra/terraform

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npx nx run-many -t build --projects=rpa-worker,automatos-ia

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image
        id: push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          ECR_REPOSITORY_AUTOMATOS_IA: ${{ secrets.ECR_REPOSITORY_AUTOMATOS_IA }}
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          # Build & push rpa-worker
          docker build -f apps/rpa-worker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push --all-tags $ECR_REGISTRY/$ECR_REPOSITORY
          
          # Build & push automatos-ia
          docker build -f apps/automatos-ia/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_AUTOMATOS_IA:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY_AUTOMATOS_IA:latest .
          docker push --all-tags $ECR_REGISTRY/$ECR_REPOSITORY_AUTOMATOS_IA
          
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy-terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & Build All
        run: |
          npm ci
          npx nx run-many -t build --projects=api-gateway

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          terraform plan \
            -var-file=environments/staging/terraform.tfvars \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: terraform apply -auto-approve tfplan
